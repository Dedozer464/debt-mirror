<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debt Mirror v2 — NCR Loan Compliance Analyser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <!-- React 18 -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Recharts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <!-- Babel standalone (JSX transpiler) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: #0a0a0c;
      color: #e2e8f0;
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0c; }
    ::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a2a38; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    select option { background: #141420; color: #e2e8f0; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseRed {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
      50%       { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
    }
    .fade-in { animation: fadeIn 0.35s ease both; }
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const {
      AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip,
      ResponsiveContainer, PieChart, Pie, Cell, Legend
    } = Recharts;

    // ── NCR CAPS ─────────────────────────────────────────────────────────────
    const NCR_CAPS = {
      mortgage:      { label: "Mortgage Agreement",          addOn: 21.0,  flatMonthly: null },
      unsecured:     { label: "Unsecured Credit",            addOn: 21.0,  flatMonthly: null },
      facility:      { label: "Credit Facility",             addOn: 14.0,  flatMonthly: null },
      shortterm:     { label: "Short-term Credit (≤6 mths)", addOn: null,  flatMonthly: 5.0  },
      developmental: { label: "Developmental Credit",        addOn: 27.0,  flatMonthly: null },
      other:         { label: "Other Credit Agreement",      addOn: 17.0,  flatMonthly: null },
    };

    // ── NEWTON-RAPHSON IRR ────────────────────────────────────────────────────
    function solveIRR(principal, monthlyPayment, months, tol = 1e-10, maxIter = 1000) {
      if (monthlyPayment <= 0 || months <= 0 || principal <= 0) return null;
      let r = 0.01;
      for (let i = 0; i < maxIter; i++) {
        const pv  = monthlyPayment * (1 - Math.pow(1 + r, -months)) / r;
        const f   = pv - principal;
        const dpv = monthlyPayment * (
          (-months * Math.pow(1 + r, -months - 1) * r - (1 - Math.pow(1 + r, -months))) / (r * r)
        );
        const rNew = r - f / dpv;
        if (Math.abs(rNew - r) < tol) return rNew * 12 * 100;
        r = rNew <= 0 ? 0.0001 : rNew;
      }
      return r * 12 * 100;
    }

    // ── AMORTISATION ─────────────────────────────────────────────────────────
    function buildSchedule(principal, monthlyRate, months, monthlyPayment) {
      const s = [];
      let balance = principal, totalInterest = 0;
      for (let m = 1; m <= months; m++) {
        const interest      = balance * monthlyRate;
        const principalPaid = Math.min(monthlyPayment - interest, balance);
        balance             = Math.max(0, balance - principalPaid);
        totalInterest      += interest;
        s.push({
          month: m,
          payment: monthlyPayment,
          interest:          parseFloat(interest.toFixed(2)),
          principal:         parseFloat(principalPaid.toFixed(2)),
          balance:           parseFloat(balance.toFixed(2)),
          cumulativeInterest: parseFloat(totalInterest.toFixed(2)),
        });
      }
      return s;
    }

    // ── FORMATTERS ────────────────────────────────────────────────────────────
    const fmt    = n => `R ${Number(n).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const fmtPct = n => `${Number(n).toFixed(2)}%`;

    // ── VERDICT BADGE ─────────────────────────────────────────────────────────
    function VerdictBadge({ level }) {
      const cfg = {
        SAFE:    { color: '#22c55e', bg: 'rgba(34,197,94,0.12)',  label: 'COMPLIANT',    icon: '✓' },
        WARNING: { color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', label: 'BORDERLINE',   icon: '⚠' },
        DANGER:  { color: '#ef4444', bg: 'rgba(239,68,68,0.12)',  label: 'ILLEGAL RATE', icon: '✕' },
      }[level] || { color: '#6b7280', bg: 'rgba(107,114,128,0.12)', label: 'UNKNOWN', icon: '?' };
      return (
        <span style={{
          display:'inline-flex', alignItems:'center', gap:6,
          background: cfg.bg, color: cfg.color,
          border:`1px solid ${cfg.color}40`,
          borderRadius:4, padding:'3px 10px',
          fontSize:11, fontFamily:"'DM Mono',monospace",
          fontWeight:700, letterSpacing:2,
        }}>
          {cfg.icon} {cfg.label}
        </span>
      );
    }

    // ── ANIMATED NUMBER ───────────────────────────────────────────────────────
    function AnimNum({ value, formatter = fmt, duration = 700 }) {
      const [display, setDisplay] = useState(value);
      const rafRef = useRef(null);
      const prevVal = useRef(value);
      useEffect(() => {
        const start = prevVal.current;
        const end   = value;
        const t0    = performance.now();
        const step  = now => {
          const t = Math.min((now - t0) / duration, 1);
          const e = t < 0.5 ? 2*t*t : -1 + (4-2*t)*t;
          setDisplay(start + (end - start) * e);
          if (t < 1) rafRef.current = requestAnimationFrame(step);
          else prevVal.current = end;
        };
        rafRef.current = requestAnimationFrame(step);
        return () => cancelAnimationFrame(rafRef.current);
      }, [value]);
      return <span>{formatter(display)}</span>;
    }

    // ── AI ANALYSIS ───────────────────────────────────────────────────────────
    async function runAIAnalysis(loanData, onDone, onError) {
      const system = `You are a South African consumer credit compliance analyst specialising in NCR regulations and predatory lending detection, particularly targeting government employees (persal-deduction loans). Respond ONLY in raw JSON with keys: verdict (SAFE|WARNING|DANGER), summary (1-2 sentences), red_flags (array of strings max 5), advice (array of strings max 4), hidden_cost_score (0-100). No markdown, no backticks, no preamble.`;
      const user = `Analyse this loan:
Principal: R${loanData.principal}
Monthly Payment (incl fees): R${loanData.monthlyPayment}
Term: ${loanData.months} months
Stated APR: ${loanData.statedAPR}%
Effective APR (Newton-Raphson): ${loanData.effectiveAPR?.toFixed(2)}%
Loan Type: ${loanData.loanTypeLabel}
NCR Maximum Rate: ${loanData.ncrCap}%
NCR Violation: ${loanData.violated ? 'YES — ILLEGAL' : 'No'}
Total Repaid: R${loanData.totalCost}
Total Interest Paid: R${loanData.totalInterest}
Interest-to-Principal Ratio: ${((loanData.totalInterest / loanData.principal) * 100).toFixed(1)}%
SARB Repo Rate used: ${loanData.repoRate}%`;
      try {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system,
            messages: [{ role: 'user', content: user }],
          }),
        });
        const data = await resp.json();
        const raw  = (data.content || []).map(b => b.text || '').join('');
        try {
          onDone(JSON.parse(raw.replace(/```json|```/g, '').trim()));
        } catch {
          onError('AI returned an unparseable response. Try again.');
        }
      } catch (e) {
        onError(e.message);
      }
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function DebtMirror() {
      const [repoRate,    setRepoRate]    = useState(8.25);
      const [loanType,    setLoanType]    = useState('unsecured');
      const [principal,   setPrincipal]   = useState(50000);
      const [statedAPR,   setStatedAPR]   = useState(29.5);
      const [months,      setMonths]      = useState(60);
      const [initFee,     setInitFee]     = useState(1207.5);
      const [monthlyFee,  setMonthlyFee]  = useState(69);
      const [insurance,   setInsurance]   = useState(150);
      const [tab,         setTab]         = useState('overview');
      const [ai,          setAI]          = useState({ loading: false, result: null, error: null });
      const [animKey,     setAnimKey]     = useState(0);

      // ── DERIVED ────────────────────────────────────────────────────────────
      const monthlyRate        = statedAPR / 100 / 12;
      const monthlyPaymentBase = monthlyRate === 0
        ? principal / months
        : (principal * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -months));
      const monthlyPaymentTotal = monthlyPaymentBase + monthlyFee + insurance;
      const effectiveAPR        = solveIRR(principal - initFee, monthlyPaymentTotal, months);

      const cap      = NCR_CAPS[loanType];
      const ncrCap   = cap.flatMonthly != null ? cap.flatMonthly * 12 : repoRate + cap.addOn;
      const violated  = effectiveAPR != null && effectiveAPR > ncrCap;
      const borderline= !violated && effectiveAPR != null && effectiveAPR > ncrCap * 0.9;
      const verdict   = violated ? 'DANGER' : borderline ? 'WARNING' : 'SAFE';
      const ncrColor  = violated ? '#ef4444' : borderline ? '#f59e0b' : '#22c55e';
      const ncrPct    = effectiveAPR != null ? Math.min((effectiveAPR / ncrCap) * 100, 100) : 0;

      const totalPaid     = monthlyPaymentTotal * months;
      const totalInterest = totalPaid - principal;
      const interestRatio = (totalInterest / principal) * 100;
      const schedule      = buildSchedule(principal, monthlyRate, months, monthlyPaymentBase);

      const chartData = schedule
        .filter((_, i) => i % Math.max(1, Math.floor(months / 24)) === 0 || i === schedule.length - 1)
        .map(r => ({ month: r.month, balance: r.balance, cumInterest: r.cumulativeInterest }));

      const pieData = [
        { name: 'Principal', value: parseFloat(principal) },
        { name: 'Interest',  value: parseFloat(Math.max(0, totalInterest).toFixed(2)) },
        { name: 'Fees',      value: parseFloat((initFee + (monthlyFee + insurance) * months).toFixed(2)) },
      ];

      useEffect(() => setAnimKey(k => k + 1), [principal, statedAPR, months, loanType]);

      const handleAnalyse = async () => {
        setAI({ loading: true, result: null, error: null });
        setTab('ai');
        await runAIAnalysis(
          { principal, monthlyPayment: monthlyPaymentTotal, months, statedAPR, effectiveAPR,
            loanTypeLabel: cap.label, ncrCap, violated,
            totalCost: totalPaid.toFixed(2), totalInterest: totalInterest.toFixed(2), repoRate },
          r  => setAI({ loading: false, result: r, error: null }),
          e  => setAI({ loading: false, result: null, error: e }),
        );
      };

      // ── SHARED STYLE TOKENS ────────────────────────────────────────────────
      const panel   = { background:'#0f0f14', border:'1px solid #1e1e28', borderRadius:12, padding:24 };
      const secLbl  = { fontSize:10, fontFamily:"'DM Mono',monospace", color:'#475569', letterSpacing:3, fontWeight:600, marginBottom:16, textTransform:'uppercase' };
      const inputSt = { width:'100%', background:'#141420', border:'1px solid #1e1e28', borderRadius:8, padding:'10px 14px', color:'#e2e8f0', fontSize:13, fontFamily:"'DM Mono',monospace", outline:'none', transition:'border-color 0.2s' };
      const selSt   = { ...inputSt, appearance:'none', WebkitAppearance:'none', cursor:'pointer' };

      const statBox = danger => ({
        background: danger ? 'rgba(220,38,38,0.06)' : '#0f0f14',
        border: `1px solid ${danger ? 'rgba(220,38,38,0.3)' : '#1e1e28'}`,
        borderRadius:10, padding:16,
        animation: danger ? 'pulseRed 2s infinite' : 'none',
      });

      const tabBtn = active => ({
        flex:1, padding:'8px 10px', borderRadius:8, border:'none',
        background: active ? '#1e1e28' : 'transparent',
        color: active ? '#f8fafc' : '#475569',
        fontSize:12, fontWeight:600, cursor:'pointer',
        fontFamily:"'Sora',sans-serif",
        transition:'all 0.18s', letterSpacing:0.3,
      });

      return (
        <div style={{ minHeight:'100vh', background:'#0a0a0c', fontFamily:"'Sora',sans-serif", color:'#e2e8f0' }}>

          {/* ── HEADER ─────────────────────────────────────────────────────── */}
          <header style={{
            borderBottom:'1px solid #1e1e28', padding:'0 32px', height:60,
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:'rgba(10,10,14,0.97)', position:'sticky', top:0, zIndex:100,
            backdropFilter:'blur(12px)',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div style={{
                width:32, height:32, borderRadius:8,
                background:'linear-gradient(135deg,#dc2626,#7f1d1d)',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:16,
              }}>◈</div>
              <span style={{
                fontSize:16, fontWeight:700, letterSpacing:'-0.5px',
                background:'linear-gradient(90deg,#f8fafc,#94a3b8)',
                WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
              }}>Debt Mirror</span>
              <span style={{
                background:'#dc2626', color:'#fff', fontSize:9,
                fontFamily:"'DM Mono',monospace", letterSpacing:2,
                padding:'2px 6px', borderRadius:3, fontWeight:700,
              }}>v2</span>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:16 }}>
              <span style={{ fontSize:11, color:'#475569', fontFamily:"'DM Mono',monospace" }}>
                SARB Repo: <span style={{ color:'#94a3b8' }}>{repoRate}%</span>
              </span>
              <VerdictBadge level={verdict} />
            </div>
          </header>

          {/* ── MAIN GRID ──────────────────────────────────────────────────── */}
          <div className="main-grid" style={{
            maxWidth:1200, margin:'0 auto', padding:'28px 24px',
            display:'grid', gridTemplateColumns:'360px 1fr', gap:24,
          }}>

            {/* LEFT — CONFIG ───────────────────────────────────────────────── */}
            <aside>
              <div style={panel}>
                <div style={secLbl}>Loan Configuration</div>

                <div style={{ marginBottom:16 }}>
                  <label style={{ fontSize:12, color:'#64748b', marginBottom:6, display:'block' }}>Loan Type</label>
                  <select style={selSt} value={loanType} onChange={e => setLoanType(e.target.value)}>
                    {Object.entries(NCR_CAPS).map(([k, v]) => (
                      <option key={k} value={k}>{v.label}</option>
                    ))}
                  </select>
                </div>

                {[
                  { label:'Principal Amount (R)', val:principal, set:setPrincipal, min:500, step:500 },
                  { label:'Stated APR (%)',        val:statedAPR, set:setStatedAPR, min:0.1, step:0.1 },
                  { label:'Term (months)',          val:months,    set:setMonths,    min:1,   max:360, step:1 },
                ].map(({ label, val, set, min, max, step }) => (
                  <div key={label} style={{ marginBottom:16 }}>
                    <label style={{ fontSize:12, color:'#64748b', marginBottom:6, display:'block' }}>{label}</label>
                    <input
                      type="number" style={inputSt}
                      value={val} min={min} max={max} step={step}
                      onChange={e => set(parseFloat(e.target.value) || 0)}
                      onFocus={e => e.target.style.borderColor='#3b3b50'}
                      onBlur={e  => e.target.style.borderColor='#1e1e28'}
                    />
                  </div>
                ))}

                <div style={{ borderTop:'1px solid #1e1e28', margin:'20px 0' }} />
                <div style={secLbl}>Fees & Settings</div>

                {[
                  { label:'Initiation Fee (R)',       val:initFee,    set:setInitFee,   step:1    },
                  { label:'Monthly Service Fee (R)',   val:monthlyFee, set:setMonthlyFee,step:1    },
                  { label:'Monthly Insurance (R)',     val:insurance,  set:setInsurance, step:1    },
                  { label:'SARB Repo Rate (%)',         val:repoRate,   set:setRepoRate,  step:0.25 },
                ].map(({ label, val, set, step }) => (
                  <div key={label} style={{ marginBottom:16 }}>
                    <label style={{ fontSize:12, color:'#64748b', marginBottom:6, display:'block' }}>{label}</label>
                    <input
                      type="number" style={inputSt}
                      value={val} step={step}
                      onChange={e => set(parseFloat(e.target.value) || 0)}
                      onFocus={e => e.target.style.borderColor='#3b3b50'}
                      onBlur={e  => e.target.style.borderColor='#1e1e28'}
                    />
                  </div>
                ))}

                <div style={{ borderTop:'1px solid #1e1e28', margin:'20px 0' }} />

                {/* NCR compliance bar */}
                <div style={{ background:'#141420', borderRadius:10, padding:14, border:'1px solid #1e1e28', marginBottom:20 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4 }}>
                    <span style={{ fontSize:10, color:'#64748b', fontFamily:"'DM Mono',monospace", letterSpacing:2 }}>NCR MAX CAP</span>
                    <span style={{ fontSize:12, color:ncrColor, fontFamily:"'DM Mono',monospace", fontWeight:600 }}>
                      {fmtPct(ncrCap)}
                    </span>
                  </div>
                  <div style={{ height:8, background:'#1e1e28', borderRadius:4, overflow:'hidden' }}>
                    <div style={{
                      height:'100%', borderRadius:4,
                      width:`${ncrPct}%`,
                      background:`linear-gradient(90deg,#22c55e,${ncrColor})`,
                      transition:'width 0.6s cubic-bezier(0.34,1.56,0.64,1)',
                    }} />
                  </div>
                  <div style={{ display:'flex', justifyContent:'space-between', marginTop:5 }}>
                    <span style={{ fontSize:10, color:'#334155', fontFamily:"'DM Mono',monospace" }}>0%</span>
                    <span style={{ fontSize:10, color:ncrColor, fontFamily:"'DM Mono',monospace" }}>
                      Effective: {effectiveAPR != null ? fmtPct(effectiveAPR) : '—'}
                    </span>
                  </div>
                </div>

                <button
                  onClick={handleAnalyse}
                  style={{
                    width:'100%', padding:14, borderRadius:10, border:'none',
                    background:'linear-gradient(135deg,#dc2626,#b91c1c)',
                    color:'#fff', fontSize:14, fontWeight:700,
                    cursor:'pointer', letterSpacing:0.5,
                    boxShadow:'0 4px 20px rgba(220,38,38,0.3)',
                    transition:'all 0.2s', fontFamily:"'Sora',sans-serif",
                  }}
                  onMouseEnter={e => e.currentTarget.style.boxShadow='0 4px 30px rgba(220,38,38,0.55)'}
                  onMouseLeave={e => e.currentTarget.style.boxShadow='0 4px 20px rgba(220,38,38,0.3)'}
                >
                  ◈ Run AI Compliance Analysis
                </button>
              </div>

              {/* Disclaimer */}
              <div style={{ marginTop:12, padding:'12px 16px', background:'#0f0f14', border:'1px solid #1e1e28', borderRadius:10, fontSize:11, color:'#334155', lineHeight:1.6 }}>
                Debt Mirror uses Newton-Raphson IRR solving to compute the true effective APR inclusive of all fees.
                NCR caps per NCA s.100–106. Not legal advice. Report violations to <span style={{ color:'#475569' }}>ncr.org.za</span>.
              </div>
            </aside>

            {/* RIGHT — RESULTS ─────────────────────────────────────────────── */}
            <main>
              {/* STAT GRID */}
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:24 }}>
                {[
                  { label:'MONTHLY TOTAL',  val:monthlyPaymentTotal,       f:fmt,    danger:false },
                  { label:'EFFECTIVE APR',  val:effectiveAPR ?? 0,         f:fmtPct, danger:violated },
                  { label:'TOTAL REPAID',   val:totalPaid,                  f:fmt,    danger:false },
                  { label:'TOTAL INTEREST', val:Math.max(0,totalInterest),  f:fmt,    danger:totalInterest > principal },
                ].map(({ label, val, f, danger }) => (
                  <div key={label} style={statBox(danger)}>
                    <div style={{ fontSize:10, color:'#475569', fontFamily:"'DM Mono',monospace", letterSpacing:2, marginBottom:6 }}>{label}</div>
                    <div style={{ fontSize:20, fontWeight:700, fontFamily:"'DM Mono',monospace", color:danger?'#ef4444':'#f8fafc' }}>
                      <AnimNum key={`${animKey}-${label}`} value={val} formatter={f} />
                    </div>
                  </div>
                ))}
              </div>

              {/* VIOLATION BANNER */}
              {violated && (
                <div style={{
                  background:'rgba(220,38,38,0.08)', border:'1px solid rgba(220,38,38,0.3)',
                  borderRadius:10, padding:'14px 18px', marginBottom:20,
                  display:'flex', alignItems:'center', gap:12,
                  animation:'fadeIn 0.3s ease',
                }}>
                  <span style={{ fontSize:22 }}>⚠</span>
                  <div>
                    <div style={{ fontWeight:700, color:'#ef4444', fontSize:13 }}>NCR Rate Cap Violated</div>
                    <div style={{ fontSize:12, color:'#94a3b8', marginTop:3 }}>
                      Effective APR of {fmtPct(effectiveAPR ?? 0)} exceeds the legal maximum of {fmtPct(ncrCap)} for {cap.label}.
                      This loan may be unenforceable under the National Credit Act.
                    </div>
                  </div>
                </div>
              )}

              {/* TABS */}
              <div style={{
                display:'flex', gap:4, marginBottom:20,
                background:'#0f0f14', borderRadius:10, padding:4,
                border:'1px solid #1e1e28',
              }}>
                {[
                  { id:'overview',  label:'Overview'      },
                  { id:'schedule',  label:'Amortisation'  },
                  { id:'breakdown', label:'Cost Breakdown' },
                  { id:'ai',        label:'AI Analysis'   },
                ].map(t => (
                  <button key={t.id} style={tabBtn(tab === t.id)} onClick={() => setTab(t.id)}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* ── TAB: OVERVIEW ─────────────────────────────────────────── */}
              {tab === 'overview' && (
                <div style={{ ...panel, animation:'fadeIn 0.3s ease' }}>
                  <div style={secLbl}>Balance vs Cumulative Interest</div>
                  <ResponsiveContainer width="100%" height={230}>
                    <AreaChart data={chartData} margin={{ top:10, right:10, bottom:0, left:10 }}>
                      <defs>
                        <linearGradient id="gBal" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor="#3b82f6" stopOpacity={0.35} />
                          <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}    />
                        </linearGradient>
                        <linearGradient id="gInt" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%"  stopColor="#ef4444" stopOpacity={0.35} />
                          <stop offset="95%" stopColor="#ef4444" stopOpacity={0}    />
                        </linearGradient>
                      </defs>
                      <CartesianGrid stroke="#1e1e28" strokeDasharray="4 4" />
                      <XAxis dataKey="month" stroke="#334155"
                        tick={{ fontSize:10, fill:'#475569', fontFamily:"'DM Mono',monospace" }}
                        label={{ value:'Month', position:'insideBottomRight', offset:-4, fill:'#334155', fontSize:10 }}
                      />
                      <YAxis stroke="#334155"
                        tick={{ fontSize:10, fill:'#475569', fontFamily:"'DM Mono',monospace" }}
                        tickFormatter={v => `R${(v/1000).toFixed(0)}k`}
                      />
                      <Tooltip
                        contentStyle={{ background:'#0f0f14', border:'1px solid #1e1e28', borderRadius:8, fontSize:12 }}
                        labelStyle={{ color:'#94a3b8', fontFamily:"'DM Mono',monospace" }}
                        formatter={(v, name) => [fmt(v), name === 'balance' ? 'Remaining Balance' : 'Cumulative Interest']}
                      />
                      <Area type="monotone" dataKey="balance"    stroke="#3b82f6" strokeWidth={2} fill="url(#gBal)" dot={false} />
                      <Area type="monotone" dataKey="cumInterest" stroke="#ef4444" strokeWidth={2} fill="url(#gInt)" dot={false} />
                    </AreaChart>
                  </ResponsiveContainer>

                  <div style={{ borderTop:'1px solid #1e1e28', margin:'20px 0' }} />
                  <div style={secLbl}>Key Metrics</div>
                  <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12 }}>
                    {[
                      { label:'Interest-to-Principal', value:`${interestRatio.toFixed(1)}%`,                                         warn:interestRatio > 100 },
                      { label:'Monthly Base Payment',  value:fmt(monthlyPaymentBase),                                                  warn:false },
                      { label:'Total Fees (lifetime)', value:fmt(initFee + (monthlyFee + insurance) * months),                        warn:false },
                      { label:'Effective vs Stated',   value:`+${((effectiveAPR ?? statedAPR) - statedAPR).toFixed(2)}%`,             warn:true  },
                      { label:'NCR Cap',               value:fmtPct(ncrCap),                                                           warn:false },
                      { label:'Compliance Status',     value:violated ? 'ILLEGAL' : borderline ? 'BORDERLINE' : 'COMPLIANT',          warn:violated || borderline },
                    ].map(({ label, value, warn }) => (
                      <div key={label} style={{ background:'#141420', borderRadius:8, padding:14, border:'1px solid #1e1e28' }}>
                        <div style={{ fontSize:10, color:'#475569', fontFamily:"'DM Mono',monospace", letterSpacing:1.5, marginBottom:6 }}>{label}</div>
                        <div style={{ fontSize:13, fontWeight:700, fontFamily:"'DM Mono',monospace", color:warn?'#ef4444':'#94a3b8' }}>{value}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── TAB: SCHEDULE ─────────────────────────────────────────── */}
              {tab === 'schedule' && (
                <div style={{ ...panel, animation:'fadeIn 0.3s ease' }}>
                  <div style={secLbl}>Full Amortisation Schedule</div>
                  <div style={{ overflowY:'auto', maxHeight:440, borderRadius:8, border:'1px solid #1e1e28' }}>
                    <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12, fontFamily:"'DM Mono',monospace" }}>
                      <thead>
                        <tr>
                          {['Month','Payment','Principal','Interest','Balance'].map(h => (
                            <th key={h} style={{
                              padding:'10px 14px', textAlign:'right',
                              background:'#141420', color:'#475569',
                              fontSize:10, letterSpacing:2,
                              position:'sticky', top:0,
                              borderBottom:'1px solid #1e1e28',
                            }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {schedule.map((r, i) => (
                          <tr key={r.month} style={{ background: i % 2 === 0 ? 'transparent' : '#0f0f14' }}>
                            <td style={{ padding:'8px 14px', textAlign:'right', color:'#475569' }}>{r.month}</td>
                            <td style={{ padding:'8px 14px', textAlign:'right', color:'#94a3b8' }}>{fmt(r.payment + monthlyFee + insurance)}</td>
                            <td style={{ padding:'8px 14px', textAlign:'right', color:'#3b82f6' }}>{fmt(r.principal)}</td>
                            <td style={{ padding:'8px 14px', textAlign:'right', color:'#ef4444' }}>{fmt(r.interest)}</td>
                            <td style={{ padding:'8px 14px', textAlign:'right', color: r.balance < principal * 0.2 ? '#22c55e' : '#e2e8f0' }}>{fmt(r.balance)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {/* ── TAB: BREAKDOWN ────────────────────────────────────────── */}
              {tab === 'breakdown' && (
                <div style={{ ...panel, animation:'fadeIn 0.3s ease' }}>
                  <div style={secLbl}>Total Cost Decomposition</div>
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24, alignItems:'center' }}>
                    <ResponsiveContainer width="100%" height={230}>
                      <PieChart>
                        <Pie data={pieData} cx="50%" cy="50%" innerRadius={55} outerRadius={85} paddingAngle={3} dataKey="value">
                          {pieData.map((_, i) => (
                            <Cell key={i} fill={['#3b82f6','#ef4444','#f59e0b'][i]} />
                          ))}
                        </Pie>
                        <Tooltip
                          contentStyle={{ background:'#0f0f14', border:'1px solid #1e1e28', borderRadius:8, fontSize:12 }}
                          formatter={v => fmt(v)}
                        />
                        <Legend wrapperStyle={{ fontSize:11, fontFamily:"'DM Mono',monospace", color:'#94a3b8' }} />
                      </PieChart>
                    </ResponsiveContainer>

                    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
                      {[
                        { label:'Principal',    val:principal,                         color:'#3b82f6' },
                        { label:'Interest',     val:Math.max(0,totalInterest),         color:'#ef4444' },
                        { label:'Init. Fee',    val:initFee,                            color:'#f59e0b' },
                        { label:'Service Fees', val:monthlyFee * months,               color:'#a78bfa' },
                        { label:'Insurance',    val:insurance * months,                color:'#34d399' },
                      ].map(({ label, val, color }) => {
                        const pct = (val / totalPaid) * 100;
                        return (
                          <div key={label}>
                            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                              <span style={{ fontSize:11, color:'#64748b' }}>{label}</span>
                              <span style={{ fontSize:12, fontFamily:"'DM Mono',monospace", color }}>{fmt(val)}</span>
                            </div>
                            <div style={{ height:4, background:'#1e1e28', borderRadius:2 }}>
                              <div style={{ height:'100%', borderRadius:2, background:color, width:`${pct.toFixed(1)}%`, transition:'width 0.8s ease' }} />
                            </div>
                          </div>
                        );
                      })}
                      <div style={{ borderTop:'1px solid #1e1e28', paddingTop:12 }}>
                        <div style={{ display:'flex', justifyContent:'space-between' }}>
                          <span style={{ fontSize:12, color:'#94a3b8', fontWeight:600 }}>Total Cost of Credit</span>
                          <span style={{ fontSize:14, fontFamily:"'DM Mono',monospace", color:'#f8fafc', fontWeight:700 }}>{fmt(totalPaid)}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ── TAB: AI ───────────────────────────────────────────────── */}
              {tab === 'ai' && (
                <div style={{ ...panel, animation:'fadeIn 0.3s ease' }}>
                  <div style={secLbl}>AI Compliance Analysis</div>

                  {!ai.result && !ai.loading && !ai.error && (
                    <div style={{ textAlign:'center', padding:'56px 24px', color:'#334155' }}>
                      <div style={{ fontSize:44, marginBottom:16, opacity:0.4 }}>◈</div>
                      <div style={{ fontSize:14, marginBottom:8, color:'#475569' }}>No analysis yet</div>
                      <div style={{ fontSize:12 }}>Click "Run AI Compliance Analysis" in the sidebar</div>
                    </div>
                  )}

                  {ai.loading && (
                    <div style={{ textAlign:'center', padding:'56px 24px' }}>
                      <div style={{ fontSize:36, marginBottom:16, display:'inline-block', animation:'spin 1.2s linear infinite', color:'#dc2626' }}>◈</div>
                      <div style={{ fontSize:13, color:'#475569' }}>Analysing loan structure against NCR regulations…</div>
                    </div>
                  )}

                  {ai.error && (
                    <div style={{ background:'rgba(220,38,38,0.08)', border:'1px solid rgba(220,38,38,0.25)', borderRadius:10, padding:20, color:'#ef4444', fontSize:13 }}>
                      ✕ {ai.error}
                    </div>
                  )}

                  {ai.result && (
                    <div>
                      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:20, flexWrap:'wrap' }}>
                        <VerdictBadge level={ai.result.verdict} />
                        {ai.result.hidden_cost_score != null && (
                          <div style={{ display:'flex', alignItems:'center', gap:8, background:'#141420', borderRadius:8, padding:'6px 12px', border:'1px solid #1e1e28' }}>
                            <span style={{ fontSize:10, color:'#475569', fontFamily:"'DM Mono',monospace", letterSpacing:1 }}>HIDDEN COST SCORE</span>
                            <span style={{
                              fontSize:14, fontWeight:700, fontFamily:"'DM Mono',monospace",
                              color: ai.result.hidden_cost_score > 70 ? '#ef4444' : ai.result.hidden_cost_score > 40 ? '#f59e0b' : '#22c55e',
                            }}>
                              {ai.result.hidden_cost_score}/100
                            </span>
                          </div>
                        )}
                      </div>

                      <div style={{ background:'#141420', borderRadius:10, padding:16, marginBottom:16, border:'1px solid #1e1e28', fontSize:13, color:'#94a3b8', lineHeight:1.7 }}>
                        {ai.result.summary}
                      </div>

                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
                        <div style={{ background:'rgba(239,68,68,0.04)', border:'1px solid rgba(239,68,68,0.15)', borderRadius:10, padding:16 }}>
                          <div style={{ fontSize:10, color:'#ef4444', fontFamily:"'DM Mono',monospace", letterSpacing:2, marginBottom:12 }}>RED FLAGS</div>
                          {(ai.result.red_flags || []).map((f, i) => (
                            <div key={i} style={{ display:'flex', gap:10, marginBottom:10, fontSize:12, color:'#94a3b8', lineHeight:1.5 }}>
                              <span style={{ color:'#ef4444', flexShrink:0 }}>✕</span>{f}
                            </div>
                          ))}
                        </div>
                        <div style={{ background:'rgba(34,197,94,0.04)', border:'1px solid rgba(34,197,94,0.15)', borderRadius:10, padding:16 }}>
                          <div style={{ fontSize:10, color:'#22c55e', fontFamily:"'DM Mono',monospace", letterSpacing:2, marginBottom:12 }}>RECOMMENDED ACTION</div>
                          {(ai.result.advice || []).map((a, i) => (
                            <div key={i} style={{ display:'flex', gap:10, marginBottom:10, fontSize:12, color:'#94a3b8', lineHeight:1.5 }}>
                              <span style={{ color:'#22c55e', flexShrink:0 }}>→</span>{a}
                            </div>
                          ))}
                        </div>
                      </div>

                      <div style={{ marginTop:16, background:'#141420', borderRadius:10, padding:12, border:'1px solid #1e1e28', fontSize:10, color:'#334155', fontFamily:"'DM Mono',monospace", lineHeight:1.8 }}>
                        NCA s.100–106 · NCR Circular 8 · Repo {repoRate}% + {cap.addOn ?? 'N/A'}% = Cap {fmtPct(ncrCap)}
                        {violated && (
                          <span style={{ color:'#ef4444', marginLeft:12 }}>
                            ▲ EXCEEDS CAP BY {fmtPct((effectiveAPR ?? 0) - ncrCap)}
                          </span>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    // ── MOUNT ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DebtMirror />);
  </script>
</body>
</html>
